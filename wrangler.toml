"$schema" = "node_modules/wrangler/config-schema.json"
name = "chkip"
main = "src/index.js"
compatibility_date = "2026-03-10"
compatibility_flags = [ "nodejs_compat" ]

[assets]
directory = "./public"
binding = "STATIC"

[observability]
enabled = true

[[routes]]
pattern = "chkip.org"
custom_domain = true
